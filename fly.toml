# fly.toml app configuration file generated for streamlit-mvp on 2026-03-10T06:06:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'streamlit-mvp'
primary_region = 'syd'

[build]

[env]
  TMM_DB_PATH = "/data/e2caf.db"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  source = "tmm_data"
  destination = "/data"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
