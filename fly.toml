# fly.toml app configuration file generated for streamlit-mvp on 2026-03-10T06:06:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'streamlit-mvp'
primary_region = 'syd'

[build]

[env]
  MERIDANT_FRAMEWORKS_DB_PATH = "/data/meridant_frameworks.db"
  MERIDANT_ASSESSMENTS_DB_PATH = "/data/meridant.db"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  # NOTE: To rename the Fly volume from 'tmm_data' to 'meridant_data', run:
  #   fly volumes list --app streamlit-mvp
  #   (Fly does not support in-place volume rename — create new volume, migrate data, update source below)
  source = "tmm_data"
  destination = "/data"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
